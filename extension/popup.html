<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #0f1626;
        --card: #18233a;
        --border: #2a3851;
        --accent: #2d7ff9;
        --accent2: #1dd6a0;
        --text: #e6ecf5;
        --dim: #8da2c0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 360px;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 14px;
      }
      h1 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .sub {
        font-size: 11px;
        color: var(--dim);
        margin-bottom: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      input {
        flex: 1;
        background: #0d1424;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 12px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #1b6fe0;
      }
      button.ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--dim);
      }
      .eid {
        width: 100%;
        margin-top: 8px;
        background: #c8102e;
      }
      .eid:hover {
        background: #a50d26;
      }
      .me {
        font-size: 11px;
        color: var(--accent2);
        margin: 10px 0;
        word-break: break-all;
      }
      .msg {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .msg .from {
        font-size: 13px;
        font-weight: 600;
      }
      .msg .meta {
        font-size: 11px;
        color: var(--dim);
        margin-top: 2px;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        padding: 1px 7px;
        border-radius: 10px;
        background: rgba(29, 214, 160, 0.15);
        color: var(--accent2);
        margin-left: 6px;
      }
      .empty {
        color: var(--dim);
        font-size: 12px;
        text-align: center;
        padding: 20px 0;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 12px 0 8px;
      }
      .toolbar span {
        font-size: 12px;
        color: var(--dim);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Behörden-Briefkasten</h1>
    <div class="sub">Deine Dokumente liegen in deinem Solid Pod.</div>

    <div id="login-view">
      <div class="row">
        <input
          id="issuer"
          value="http://localhost:3000"
          placeholder="Pod-Provider URL"
        />
        <button id="login-btn">Login</button>
      </div>
      <button class="eid" id="eid-btn">Mit E-ID anmelden</button>
      <div class="sub" style="margin-top: 8px">
        E-ID als Vertrauensanker (Prototyp). Produktiv: swiyu.
      </div>
    </div>

    <div id="inbox-view" class="hidden">
      <div class="me" id="webid"></div>
      <div class="toolbar">
        <span id="count">Eingang</span>
        <div class="row">
          <button class="ghost" id="refresh-btn">Aktualisieren</button>
          <button class="ghost" id="logout-btn">Logout</button>
        </div>
      </div>
      <div id="list"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
